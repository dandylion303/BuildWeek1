<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Quiz</title>
  </head>

  <body>
    <header>
      <img src="./assets/epicode_logo.png" alt="Epicode logo" />
      <div class="timer-container">
        <svg class="timer-svg" width="200" height="200">
          <circle class="timer-background" cx="100" cy="100" r="90"></circle>
          <circle
            class="timer-path"
            cx="100"
            cy="100"
            r="90"
            id="timer-path"
          ></circle>
        </svg>
        <div>
          <p>time</p>

          <div class="timer-label" id="timer"></div>
          <p>remaining</p>
        </div>
      </div>
    </header>

    <main>
      <h1 id="questionText"></h1>

      <div id="answers">
        <p class="question"></p>

        <input
          id="opt1"
          type="radio"
          name="cpu"
          value="central_processing_unit"
        />
        <label for="opt1"></label><br />

        <input
          id="opt2"
          type="radio"
          name="cpu"
          value="computer_personal_unit"
        />
        <label for="opt2"></label><br />

        <input
          id="opt3"
          type="radio"
          name="cpu"
          value="central_processor_unit"
        />
        <label for="opt3"></label><br />

        <input
          id="opt4"
          type="radio"
          name="cpu"
          value="control_processing_unit"
        />

        <label for="opt4"></label>
      </div>
    </main>

    <footer class="counter">
      QUESTION <span id="questionNumber">1</span> / 10
    </footer>

    <script src="./question.js"></script>
  </body>
</html>
