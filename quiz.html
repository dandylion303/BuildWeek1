<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Quiz</title>
</head>

<body>
    <header>
        <img src="./assets/epicode_logo.png" alt="Epicode logo">
    </header>

    <main>
        <h1 id="questionText"></h1>

        <div id="answers">
            <p class="question">"What does CPU stand for?</p>

            <input id="opt1" type="radio" name="cpu" value="central_processing_unit">
            <label for="opt1">Central Processing Unit</label><br>

            <input id="opt2" type="radio" name="cpu" value="computer_personal_unit">
            <label for="opt2">Computer Personal Unit</label><br>

            <input id="opt3" type="radio" name="cpu" value="central_processor_unit">
            <label for="opt3">Central Processor Unit</label><br>

            <input id="opt4" type="radio" name="cpu" value="control_processing_unit">
            <label for="opt4">Control Processing Unit</label>
        </div>

    </main>

    <footer class="counter">
        QUESTION <span id="questionNumber">1</span> / 10
    </footer>
  
<script src="./welcome.js"> </script>


</body>

</html>
